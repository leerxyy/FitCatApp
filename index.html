<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>🐱 FitCat</title>
  <style>
    /* ========== СБРОС И БАЗА ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { background: #0D1117; }
    
    body {
      background: #0D1117;
      background-image: linear-gradient(135deg, #0D1117 0%, #1A1B2F 50%, #16213E 100%);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #E6EDF3;
      padding: 16px 12px 40px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      animation: bgPulse 8s ease-in-out infinite;
      background-size: 200% 200%;
    }
    
    @supports (padding-top: env(safe-area-inset-top)) {
      body {
        padding-top: calc(16px + env(safe-area-inset-top));
        padding-bottom: calc(40px + env(safe-area-inset-bottom));
        padding-left: calc(12px + env(safe-area-inset-left));
        padding-right: calc(12px + env(safe-area-inset-right));
      }
    }
    
    @keyframes bgPulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .app { max-width: 480px; margin: 0 auto; animation: fadeIn 0.5s ease-out; }
    
    h1 {
      font-size: 32px; font-weight: 700; margin-bottom: 24px;
      background: linear-gradient(135deg, #00F2FE 0%, #4FACFE 50%, #A855F7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; background-size: 200% 100%;
      animation: textShimmer 4s ease-in-out infinite;
    }
    
    @keyframes textShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    h2 { font-size: 18px; font-weight: 600; color: #9CA3AF; margin-bottom: 16px; letter-spacing: -0.3px; }
    h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #E6EDF3; }
    
    .card {
      background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(48, 54, 61, 0.5);
      border-radius: 24px; padding: 20px 18px; margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: slideUp 0.4s ease-out forwards;
      opacity: 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
      box-shadow: 0 12px 40px rgba(79,172,254,0.1);
      transform: translateY(-2px);
    }
    
    .card:nth-of-type(1) { animation-delay: 0.1s; }
    .card:nth-of-type(2) { animation-delay: 0.2s; }
    .card:nth-of-type(3) { animation-delay: 0.3s; }
    .card:nth-of-type(4) { animation-delay: 0.4s; }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .input-group { margin-bottom: 18px; }
    
    label { 
      display: block; font-size: 13px; font-weight: 500; 
      color: #9CA3AF; margin-bottom: 6px; text-transform: uppercase; 
      letter-spacing: 0.5px;
    }
    
    input, select {
      width: 100%; background: rgba(1, 4, 9, 0.6); border: 1px solid #30363D; 
      border-radius: 16px; padding: 14px 16px; font-size: 16px; 
      color: #E6EDF3; outline: none; transition: all 0.25s ease;
      -webkit-appearance: none; font-family: inherit;
      backdrop-filter: blur(5px);
    }
    
    input:focus { 
      border-color: #4FACFE; 
      box-shadow: 0 0 0 3px rgba(79,172,254,0.2);
      transform: scale(1.01);
    }
    
    input:hover { border-color: #4FACFE; }
    input::placeholder { color: #6B7280; opacity: 0.7; }
    
    /* ========== КАСТОМНЫЕ РАДИО-КНОПКИ ========== */
    .radio-group {
      display: flex; gap: 24px; background: rgba(1, 4, 9, 0.6); 
      padding: 8px 16px; border-radius: 20px; border: 1px solid #30363D;
      backdrop-filter: blur(5px);
    }
    
    .radio-group input[type="radio"] { display: none; }
    
    .radio-group label {
      position: relative; padding-left: 32px; cursor: pointer;
      font-size: 16px; color: #E6EDF3; text-transform: none;
      display: inline-block; margin: 0; line-height: 24px;
    }
    
    .radio-group label::before {
      content: ''; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%); width: 22px; height: 22px;
      border: 2px solid #30363D; border-radius: 50%;
      background: #010409; transition: all 0.2s ease;
    }
    
    .radio-group input[type="radio"]:checked + label::before {
      border-color: #4FACFE; background: #4FACFE;
      box-shadow: inset 0 0 0 5px #010409;
      animation: radioPop 0.2s ease;
    }
    
    @keyframes radioPop {
      0% { transform: translateY(-50%) scale(1); }
      50% { transform: translateY(-50%) scale(1.1); }
      100% { transform: translateY(-50%) scale(1); }
    }
    
    /* ========== АКТИВНОСТЬ ========== */
    .activity-options { display: flex; flex-direction: column; gap: 12px; }
    
    .activity-item {
      background: rgba(1, 4, 9, 0.6); border: 1px solid #30363D; border-radius: 18px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px; 
      cursor: pointer; transition: all 0.2s ease; backdrop-filter: blur(5px);
    }
    
    .activity-item:hover { border-color: #4FACFE; transform: translateX(4px); }
    
    .activity-item.selected { 
      border-color: #4FACFE; 
      background: rgba(79,172,254,0.1);
      box-shadow: 0 0 20px rgba(79,172,254,0.15);
    }
    
    .activity-text { font-weight: 600; margin-bottom: 2px; }
    .activity-desc { font-size: 13px; color: #9CA3AF; }
    
    /* ========== КНОПКИ ========== */
    .btn-primary, .btn-secondary {
      width: 100%; border: none; border-radius: 40px; padding: 16px 24px;
      font-size: 16px; font-weight: 700; cursor: pointer; 
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 10px;
      -webkit-appearance: none; text-align: center;
    }
    
    .btn-primary {
      background: #1A2027;
      color: #E6EDF3;
      position: relative;
      z-index: 1;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(90deg, #00F2FE, #4FACFE, #A855F7, #00F2FE);
      background-size: 300% 100%;
      border-radius: 40px;
      z-index: -1;
      animation: borderShimmer 4s linear infinite;
    }
    
    @keyframes borderShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(79,172,254,0.3); }
    .btn-primary:active { transform: scale(0.98); }
    
    .btn-secondary {
      background: transparent; border: 1px solid #30363D; color: #E6EDF3;
    }
    
    .btn-secondary:hover { border-color: #4FACFE; background: rgba(79,172,254,0.05); }
    
    .btn-small {
      background: rgba(26, 32, 39, 0.8); border: 1px solid #30363D; 
      border-radius: 30px; padding: 10px 16px; font-size: 14px; 
      color: #E6EDF3; cursor: pointer; transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }
    
    .btn-small:hover { border-color: #4FACFE; background: rgba(79,172,254,0.1); transform: translateY(-2px); }
    
    /* ========== ШКАЛЫ С ПЛАВНЫМ ЗАПОЛНЕНИЕМ ========== */
    .progress-bar-container { 
      height: 10px; background: rgba(33, 38, 45, 0.6); 
      border-radius: 10px; margin: 8px 0 16px; overflow: hidden;
      backdrop-filter: blur(5px);
    }
    
    .progress-bar {
      height: 100%; border-radius: 10px; 
      transition: width 0.6s cubic-bezier(0.22, 0.97, 0.33, 1.02);
      background-size: 200% 100%; animation: shimmer 3s ease-in-out infinite;
      width: 0%;
    }
    
    .bar-kcal { background-image: linear-gradient(90deg, #FF6B6B, #FF8E53, #FF6B6B); }
    .bar-protein { background-image: linear-gradient(90deg, #4FACFE, #00F2FE, #4FACFE); }
    .bar-fat { background-image: linear-gradient(90deg, #FFD93D, #FFB347, #FFD93D); }
    .bar-carbs { background-image: linear-gradient(90deg, #6BCB77, #4D96FF, #6BCB77); }
    .bar-water { background-image: linear-gradient(90deg, #00F2FE, #4FACFE, #00F2FE); }
    .bar-over { background: #F85149 !important; background-image: none !important; animation: none; }
    
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* ========== ВОДА ========== */
    .water-row { display: flex; gap: 12px; align-items: center; }
    .water-row input[type="number"] { width: 100px; }
    input[type="range"] { flex: 3; accent-color: #4FACFE; height: 6px; background: transparent; }
    
    /* ========== ТАБЫ ========== */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; text-align: center; padding: 12px; 
      background: rgba(33, 38, 45, 0.6); border-radius: 20px; 
      cursor: pointer; font-weight: 600; color: #9CA3AF;
      transition: all 0.2s ease; backdrop-filter: blur(5px);
    }
    .tab:hover { background: rgba(79,172,254,0.1); color: #E6EDF3; }
    .tab.active { background: #4FACFE; color: #0D1117; }
    
    .page { display: none; }
    .page.active { display: block; }
    
    /* ========== ЕДА С КРУЖОЧКАМИ ========== */
    .food-list { margin: 16px 0; }
    .food-item {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: rgba(1, 4, 9, 0.5); border-radius: 16px; margin-bottom: 8px;
      transition: all 0.2s ease; backdrop-filter: blur(5px);
    }
    .food-item:hover { background: rgba(1, 4, 9, 0.7); transform: translateX(4px); }
    
    .food-toggle {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #4FACFE;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .food-toggle.checked {
      background: #4FACFE;
      border-color: #4FACFE;
    }
    
    .food-toggle.checked::after {
      content: '✓';
      color: #0D1117;
      font-size: 16px;
      font-weight: bold;
    }
    
    .food-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(79,172,254,0.5);
    }
    
    .food-info { flex: 1; }
    .food-name { font-weight: 500; }
    .food-macros { font-size: 12px; color: #9CA3AF; }
    .food-delete { 
      color: #F85149; cursor: pointer; padding: 8px; font-size: 18px; 
      transition: transform 0.2s;
    }
    .food-delete:hover { transform: scale(1.2); }
    
    .add-food-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .add-food-row { display: flex; gap: 8px; }
    .add-food-row input { padding: 10px; font-size: 14px; }
    
    /* ========== УТИЛИТЫ ========== */
    .flex { display: flex; gap: 8px; align-items: center; }
    .text-center { text-align: center; }
    .text-small { font-size: 13px; color: #9CA3AF; }
    .mb-2 { margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="app">
  <!-- ========== СТРАНИЦА РЕГИСТРАЦИИ ========== -->
  <div id="setupPage">
    <h1>🐱 FitCat</h1>
    
    <div class="card">
      <h2 data-i18n="about">О себе</h2>
      <div class="input-group"><label data-i18n="name">Имя</label><input type="text" id="setupName" data-i18n-placeholder="name_placeholder" placeholder="Введите имя"></div>
      <div class="input-group"><label data-i18n="age">Возраст</label><input type="number" id="setupAge" data-i18n-placeholder="age_placeholder" placeholder="Введите возраст" min="10" max="100"></div>
      
      <div class="input-group">
        <label data-i18n="gender">Пол</label>
        <div class="radio-group">
          <input type="radio" name="setupGender" value="female" id="genderFemale" checked>
          <label for="genderFemale"><span data-i18n="female">Женский</span></label>
          
          <input type="radio" name="setupGender" value="male" id="genderMale">
          <label for="genderMale"><span data-i18n="male">Мужской</span></label>
        </div>
      </div>
      
      <div class="input-group"><label data-i18n="height">Рост (см)</label><input type="number" id="setupHeight" data-i18n-placeholder="height_placeholder" placeholder="Введите рост" min="100" max="250"></div>
      <div class="input-group"><label data-i18n="weight_label">Вес (кг)</label><input type="number" id="setupWeight" data-i18n-placeholder="weight_placeholder" placeholder="Введите вес" min="30" max="450" step="0.1"></div>
    </div>
    
    <div class="card">
      <h2 data-i18n="activity">Активность</h2>
      <div class="activity-options">
        <div class="activity-item" data-activity="1.2" onclick="selectActivity(this)">
          <div><div class="activity-text" data-i18n="activity_low">Малая</div><div class="activity-desc" data-i18n="activity_low_desc">Сидячая работа</div></div>
        </div>
        <div class="activity-item selected" data-activity="1.375" onclick="selectActivity(this)">
          <div><div class="activity-text" data-i18n="activity_mid">Умеренная</div><div class="activity-desc" data-i18n="activity_mid_desc">Тренировки 2-3 раза</div></div>
        </div>
        <div class="activity-item" data-activity="1.55" onclick="selectActivity(this)">
          <div><div class="activity-text" data-i18n="activity_high">Высокая</div><div class="activity-desc" data-i18n="activity_high_desc">Спорт 5+ раз</div></div>
        </div>
      </div>
    </div>
    
    <button class="btn-primary" onclick="completeSetup()"><span data-i18n="calculate">Рассчитать нормы</span></button>
    <div class="text-center text-small" style="margin-top: 16px;" data-i18n="data_local">Данные только в твоём телефоне</div>
    
    <div class="card" style="margin-top: 20px;">
      <h2 data-i18n="language">Язык</h2>
      <div class="flex">
        <button class="btn-small" style="flex:1;" onclick="setLanguage('ru')">🇷🇺 Русский</button>
        <button class="btn-small" style="flex:1;" onclick="setLanguage('en')">🇬🇧 English</button>
        <button class="btn-small" style="flex:1;" onclick="setLanguage('cn')">🇨🇳 中文</button>
      </div>
    </div>
  </div>

  <!-- ========== ГЛАВНЫЙ ЭКРАН ========== -->
  <div id="mainPage" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1 style="margin: 0;" id="greetingText">🐱 FitCat</h1>
      <button class="btn-small" onclick="showPage('settingsPage')"><span data-i18n="settings_btn">Настройки</span></button>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('today')"><span data-i18n="tab_today">Сегодня</span></div>
      <div class="tab" onclick="switchTab('weight')"><span data-i18n="tab_weight">Вес</span></div>
    </div>
    
    <div id="todayPage" class="page active">
      <div class="card">
        <h2 data-i18n="progress">Прогресс</h2>
        <div id="progressBars"></div>
      </div>
      
      <div class="card">
        <h2 data-i18n="water_title">Вода</h2>
        <div class="water-row">
          <input type="range" id="waterSlider" min="0" max="100" step="1" value="0">
          <input type="number" id="waterInput" min="0" step="50" value="0">
          <span data-i18n="ml">мл</span>
        </div>
        <div class="flex" style="justify-content: space-between; margin-top: 8px;">
          <span id="waterText">0 мл</span>
          <span id="waterGoalText">2000 мл</span>
        </div>
      </div>
      
      <div class="card">
        <h2 data-i18n="meals">Сегодня съедено</h2>
        <div class="food-list" id="foodListContainer"></div>
        
        <div class="add-food-form">
          <input type="text" id="foodName" data-i18n-placeholder="food_name" placeholder="Название продукта">
          <div style="font-size: 13px; color: #9CA3AF; margin: 4px 0;">На 100 грамм:</div>
          <div class="add-food-row">
            <input type="number" id="foodProt100" placeholder="Б" step="0.1">
            <input type="number" id="foodFat100" placeholder="Ж" step="0.1">
            <input type="number" id="foodCarb100" placeholder="У" step="0.1">
            <input type="number" id="foodKcal100" placeholder="Ккал">
          </div>
          <div class="add-food-row">
            <input type="number" id="foodWeight" placeholder="Вес (грамм)" step="1" min="1" style="flex: 1;">
          </div>
          <button class="btn-primary" onclick="addFood()" style="margin-top: 8px;"><span data-i18n="add_food">Добавить</span></button>
        </div>
      </div>
    </div>
    
    <div id="weightPage" class="page">
      <div class="card">
        <h2 data-i18n="weight_log">Журнал веса</h2>
        <div class="flex mb-2">
          <input type="number" id="newWeight" data-i18n-placeholder="weight_input" placeholder="Вес" step="0.1" style="flex: 2;">
          <input type="date" id="weightDate" style="flex: 2;">
          <button class="btn-small" onclick="addWeightEntry()" style="flex: 1;"><span data-i18n="add">Добавить</span></button>
        </div>
        <canvas id="weightChart" style="width:100%; height:200px;"></canvas>
      </div>
    </div>
  </div>

  <!-- ========== НАСТРОЙКИ ========== -->
  <div id="settingsPage" style="display: none;">
    <div class="card">
      <h2 data-i18n="settings">Настройки</h2>
      <button class="btn-secondary" onclick="exportData()"><span data-i18n="export">Скачать данные</span></button>
      <button class="btn-secondary" onclick="importData()"><span data-i18n="import">Загрузить данные</span></button>
      <button class="btn-secondary" onclick="resetAllData()"><span data-i18n="reset">Сбросить всё</span></button>
      
      <h2 style="margin-top: 24px;" data-i18n="language">Язык</h2>
      <div class="flex">
        <button class="btn-small" style="flex:1;" onclick="setLanguage('ru')">🇷🇺 Русский</button>
        <button class="btn-small" style="flex:1;" onclick="setLanguage('en')">🇬🇧 English</button>
        <button class="btn-small" style="flex:1;" onclick="setLanguage('cn')">🇨🇳 中文</button>
      </div>
      
      <button class="btn-primary" onclick="showPage('mainPage')" style="margin-top: 24px;"><span data-i18n="back">Назад</span></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  // ========== ПЕРЕВОДЫ ==========

    },
    en: {

      height: 'Height (cm)', height_placeholder: 'Enter height',

      settings_btn: 'Settings', tab_today: 'Today', tab_weight: 'Weight',
      progress: 'Progress', water_title: 'Water', ml: 'ml',
      meals: 'Today\'s food', food_name: 'Food name', add_food: 'Add',
      weight_log: 'Weight Log', weight_input: 'Weight', add: 'Add',
      settings: 'Settings', export: 'Export Data', import: 'Import Data', reset: 'Reset All', back: 'Back',
      morning: 'Good morning', day: 'Good afternoon', evening: 'Good evening', night: 'Good night',
      kcal: 'Calories', protein: 'Protein', fat: 'Fat', carbs: 'Carbs', water: 'Water',
      empty_food: 'Add your first food',
      error_fill: 'Please fill in all fields'
    },
    cn: {
      about: '关于你', name: '名字', name_placeholder: '输入名字',
      age: '年龄', age_placeholder: '输入年龄',
      gender: '性别', female: '女', male: '男',
      height: '身高 (cm)', height_placeholder: '输入身高',
      weight_label: '体重 (kg)', weight_placeholder: '输入体重',
      activity: '活动量',
      activity_low: '低', activity_low_desc: '久坐',
      activity_mid: '中', activity_mid_desc: '每周运动2-3次',
      activity_high: '高', activity_high_desc: '每周运动5+次',
      calculate: '计算', data_local: '数据仅保存在本地',
      language: '语言',
      settings_btn: '设置', tab_today: '今天', tab_weight: '体重',
      progress: '进度', water_title: '水', ml: '毫升',
      meals: '今日饮食', food_name: '食物名称', add_food: '添加',
      weight_log: '体重记录', weight_input: '体重', add: '添加',
      settings: '设置', export: '导出数据', import: '导入数据', reset: '全部重置', back: '返回',
      morning: '早上好', day: '下午好', evening: '晚上好', night: '晚安',
      kcal: '卡路里', protein: '蛋白质', fat: '脂肪', carbs: '碳水', water: '水',
      empty_food: '添加第一个食物',
      error_fill: '请填写所有字段'
    }
  };
  
  let currentLang = 'ru';
  let currentProfile = null;
  let dailyTargets = { kcal: 1500, protein: 80, fat: 45, carbs: 150, water: 2000 };
  let todayFoods = [];
  let weightHistory = [];
  let chartInstance = null;
  
  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('fitcat_lang', lang);
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (translations[lang]?.[key]) el.innerText = translations[lang][key];
    });
    
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (translations[lang]?.[key]) el.placeholder = translations[lang][key];
    });
    
    if (currentProfile) {
      updateGreeting();
      renderProgressBars();
      renderFoodList();
      updateWaterDisplay();
    }
  }
  
  window.onload = function() {
    const savedLang = localStorage.getItem('fitcat_lang') || 'ru';
    setLanguage(savedLang);
    loadData();
    if (!currentProfile) {
      document.getElementById('setupPage').style.display = 'block';
      document.getElementById('mainPage').style.display = 'none';
    } else {
      document.getElementById('setupPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      calculateTargets();
      renderDashboard();
      checkDateReset();
      updateGreeting();
    }
    setupWaterControls();
  };
  
  function loadData() {
    currentProfile = JSON.parse(localStorage.getItem('fitnessProfile') || 'null');
    todayFoods = JSON.parse(localStorage.getItem('todayFoods') || '[]');
    weightHistory = JSON.parse(localStorage.getItem('weightHistory') || '[]');
  }
  
  function saveAllData() {
    if (currentProfile) localStorage.setItem('fitnessProfile', JSON.stringify(currentProfile));
    localStorage.setItem('todayFoods', JSON.stringify(todayFoods));
    localStorage.setItem('weightHistory', JSON.stringify(weightHistory));
  }
  
  function checkDateReset() {
    const lastDate = localStorage.getItem('lastDate');
    const today = new Date().toDateString();
    if (lastDate !== today) {
      todayFoods = [];
      localStorage.setItem('waterAmount', 0);
      localStorage.setItem('lastDate', today);
      saveAllData();
    }
  }
  
  function updateGreeting() {
    const hour = new Date().getHours();
    let greetKey = 'day';
    if (hour >= 5 && hour < 12) greetKey = 'morning';
    else if (hour >= 12 && hour < 18) greetKey = 'day';
    else if (hour >= 18 && hour < 23) greetKey = 'evening';
    else greetKey = 'night';
    const greeting = translations[currentLang][greetKey];
    document.getElementById('greetingText').innerHTML = `🐱 ${greeting}, ${currentProfile?.name || ''}`;
  }
  
  function selectActivity(el) {
    document.querySelectorAll('.activity-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
  }
  
  function completeSetup() {
    const name = document.getElementById('setupName').value.trim();
    const age = parseInt(document.getElementById('setupAge').value);
    const gender = document.querySelector('input[name="setupGender"]:checked')?.value;
    const height = parseFloat(document.getElementById('setupHeight').value);
    const weight = parseFloat(document.getElementById('setupWeight').value);
    const activityEl = document.querySelector('.activity-item.selected');
    
    if (!name || !age || age < 10 || age > 100 || !gender || !height || height < 100 || height > 250 || !weight || weight < 30 || weight > 450 || !activityEl) {
      alert(translations[currentLang].error_fill);
      return;
    }
    
    const activity = parseFloat(activityEl.dataset.activity);
    
    currentProfile = { name, age, gender, height, weight, activity, startWeight: weight };
    calculateTargets();
    saveAllData();
    localStorage.setItem('lastDate', new Date().toDateString());
    
    document.getElementById('setupPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    updateGreeting();
    renderDashboard();
  }
  
  function calculateTargets() {
    if (!currentProfile) return;
    const p = currentProfile;
    let bmr = p.gender === 'female' 
      ? 447.6 + (9.2 * p.weight) + (3.1 * p.height) - (4.3 * p.age)
      : 88.36 + (13.4 * p.weight) + (4.8 * p.height) - (5.7 * p.age);
    let tdee = bmr * p.activity;
    dailyTargets = {
      kcal: Math.round(tdee * 0.85),
      protein: Math.round(p.weight * 1.8),
      fat: Math.round(p.weight * 0.9),
      carbs: Math.round((tdee * 0.85 - p.weight * 1.8 * 4 - p.weight * 0.9 * 9) / 4),
      water: Math.round(p.weight * 35)
    };
  }
  
  function renderDashboard() {
    renderProgressBars();
    renderFoodList();
    updateWaterDisplay();
  }
  
  function renderProgressBars() {
    let consumed = { kcal: 0, protein: 0, fat: 0, carbs: 0 };
    todayFoods.forEach(f => { if(f.checked) {
      consumed.kcal += f.kcal || 0;
      consumed.protein += f.protein || 0;
      consumed.fat += f.fat || 0;
      consumed.carbs += f.carbs || 0;
    }});
    const waterAmount = parseInt(localStorage.getItem('waterAmount') || 0);
    
    const t = translations[currentLang];
    const bars = [
      { label: t.kcal, current: consumed.kcal, target: dailyTargets.kcal, unit: currentLang === 'en' ? 'kcal' : 'ккал', cls: 'bar-kcal' },
      { label: t.protein, current: consumed.protein, target: dailyTargets.protein, unit: 'г', cls: 'bar-protein' },
      { label: t.fat, current: consumed.fat, target: dailyTargets.fat, unit: 'г', cls: 'bar-fat' },
      { label: t.carbs, current: consumed.carbs, target: dailyTargets.carbs, unit: 'г', cls: 'bar-carbs' },
      { label: t.water, current: waterAmount, target: dailyTargets.water, unit: currentLang === 'en' ? 'ml' : 'мл', cls: 'bar-water' }
    ];
    
    let html = '';
    bars.forEach(b => {
      const pct = (b.current / b.target) * 100;
      const isOver = pct > 100;
      const displayPct = Math.round(pct);
      const barClass = isOver ? 'bar-over' : b.cls;
      
      html += `
        <div class="flex" style="justify-content: space-between;">
          <span>${b.label} ${Math.round(b.current)}/${b.target} ${b.unit}</span>
          <span style="color: ${isOver ? '#F85149' : '#9CA3AF'}">${displayPct}%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar ${barClass}" style="width: ${pct}%; ${isOver ? 'background: #F85149;' : ''}"></div>
        </div>
      `;
    });
    
    document.getElementById('progressBars').innerHTML = html;
  }
  
  function renderFoodList() {
    const t = translations[currentLang];
    let html = '';
    todayFoods.forEach((f, idx) => {
      html += `<div class="food-item">
        <div class="food-toggle ${f.checked ? 'checked' : ''}" onclick="toggleFood(${idx})"></div>
        <div class="food-info">
          <div class="food-name">${f.name} (${f.weight}г)</div>
          <div class="food-macros">${t.protein.slice(0,1)}:${f.protein} ${t.fat.slice(0,1)}:${f.fat} ${t.carbs.slice(0,1)}:${f.carbs} ${f.kcal} ${currentLang === 'en' ? 'kcal' : 'ккал'}</div>
        </div>
        <span class="food-delete" onclick="deleteFood(${idx})">✕</span>
      </div>`;
    });
    document.getElementById('foodListContainer').innerHTML = html || `<div class="text-center text-small" style="padding: 20px;">${t.empty_food}</div>`;
  }
  
  function addFood() {
    const name = document.getElementById('foodName').value;
    if (!name) return alert(currentLang === 'ru' ? 'Введите название' : currentLang === 'en' ? 'Enter name' : '输入名称');
    
    const prot100 = parseFloat(document.getElementById('foodProt100').value) || 0;
    const fat100 = parseFloat(document.getElementById('foodFat100').value) || 0;
    const carb100 = parseFloat(document.getElementById('foodCarb100').value) || 0;
    const kcal100 = parseFloat(document.getElementById('foodKcal100').value) || 0;
    const weight = parseFloat(document.getElementById('foodWeight').value) || 100;
    
    const multiplier = weight / 100;
    const protein = Math.round(prot100 * multiplier * 10) / 10;
    const fat = Math.round(fat100 * multiplier * 10) / 10;
    const carbs = Math.round(carb100 * multiplier * 10) / 10;
    const kcal = Math.round(kcal100 * multiplier);
    
    todayFoods.push({ name, protein, fat, carbs, kcal, weight, checked: false });
    saveAllData();
    renderDashboard();
    
    document.getElementById('foodName').value = '';
    document.getElementById('foodProt100').value = '';
    document.getElementById('foodFat100').value = '';
    document.getElementById('foodCarb100').value = '';
    document.getElementById('foodKcal100').value = '';
    document.getElementById('foodWeight').value = '';
  }
  
  function toggleFood(idx) {
    todayFoods[idx].checked = !todayFoods[idx].checked;
    saveAllData();
    renderProgressBars();
    renderFoodList();
  }
  
  function deleteFood(idx) {
    todayFoods.splice(idx, 1);
    saveAllData();
    renderDashboard();
  }
  
  function setupWaterControls() {
    const slider = document.getElementById('waterSlider');
    const input = document.getElementById('waterInput');
    function updateWater(value) {
      const ml = Math.round((value / 100) * dailyTargets.water);
      localStorage.setItem('waterAmount', ml);
      document.getElementById('waterText').innerText = ml + (currentLang === 'en' ? ' ml' : ' мл');
      slider.value = value;
      input.value = ml;
      renderProgressBars();
    }
    slider.addEventListener('input', e => updateWater(e.target.value));
    input.addEventListener('change', e => {
      const ml = parseInt(e.target.value) || 0;
      const pct = (ml / dailyTargets.water) * 100;
      updateWater(pct);
    });
  }
  
  function updateWaterDisplay() {
    const ml = parseInt(localStorage.getItem('waterAmount') || 0);
    const pct = (ml / dailyTargets.water) * 100;
    document.getElementById('waterSlider').value = pct;
    document.getElementById('waterInput').value = ml;
    document.getElementById('waterText').innerText = ml + (currentLang === 'en' ? ' ml' : ' мл');
    document.getElementById('waterGoalText').innerText = dailyTargets.water + (currentLang === 'en' ? ' ml' : ' мл');
  }
  
  function addWeightEntry() {
    const weight = parseFloat(document.getElementById('newWeight').value);
    const date = document.getElementById('weightDate').value || new Date().toISOString().split('T')[0];
    if (!weight) return;
    weightHistory.push({ date, weight });
    saveAllData();
    renderWeightChart();
    document.getElementById('newWeight').value = '';
  }
  
  function renderWeightChart() {
    const ctx = document.getElementById('weightChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    if (weightHistory.length === 0) return;
    const sorted = [...weightHistory].sort((a,b) => new Date(a.date) - new Date(b.date));
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: sorted.map(e => e.date),
        datasets: [{
          label: currentLang === 'ru' ? 'Вес (кг)' : currentLang === 'en' ? 'Weight (kg)' : '体重 (kg)',
          data: sorted.map(e => e.weight),
          borderColor: '#4FACFE',
          backgroundColor: 'rgba(79,172,254,0.1)',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#E6EDF3' } } },
        scales: { x: { ticks: { color: '#9CA3AF' } }, y: { ticks: { color: '#9CA3AF' } } }
      }
    });
  }
  
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('todayPage').classList.toggle('active', tab === 'today');
    document.getElementById('weightPage').classList.toggle('active', tab === 'weight');
    if (tab === 'weight') renderWeightChart();
  }
  
  function showPage(pageId) {
    document.getElementById('mainPage').style.display = pageId === 'mainPage' ? 'block' : 'none';
    document.getElementById('settingsPage').style.display = pageId === 'settingsPage' ? 'block' : 'none';
  }
  
  function exportData() {
    const data = { profile: currentProfile, foods: todayFoods, weight: weightHistory };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'fitcat_backup.json'; a.click();
  }
  
  function importData() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = event => {
        const data = JSON.parse(event.target.result);
        currentProfile = data.profile;
        todayFoods = data.foods;
        weightHistory = data.weight;
        saveAllData();
        location.reload();
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function resetAllData() {
    const msg = currentLang === 'ru' ? 'Точно сбросить ВСЁ?' : currentLang === 'en' ? 'Reset ALL data?' : '确定重置全部？';
    if (confirm(msg)) {
      localStorage.clear();
      location.reload();
    }
  }
</script>
</body>
</html>
